name: AI Legal Review & IPFS Manifest
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ai-legal-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect Legal File Changes
        id: changed
        run: |
          echo "Scanning for legal/compliance file changes..."
          git diff --name-only HEAD~1 HEAD | grep -E 'LEGAL|COMPLIANCE|IPFS' > changes.txt || true
          echo "CHANGED_FILES=$(cat changes.txt | tr '\n' ',' | sed 's/,$//' || echo 'none')" >> $GITHUB_ENV

      - name: AI Legal Review Summary
        run: |
          echo "## AI Legal Architect Review" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Changed files: $CHANGED_FILES" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Actions Required:" >> $GITHUB_STEP_SUMMARY
          echo "1. Verify all Conditions Precedent remain satisfied" >> $GITHUB_STEP_SUMMARY
          echo "2. Check for dilution of TROPTIONS protections" >> $GITHUB_STEP_SUMMARY
          echo "3. If document is FINAL, generate SHA-256 and prepare IPFS manifest" >> $GITHUB_STEP_SUMMARY
          echo "4. Compliance Officer must approve before merge" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "[AI-LEGAL] Automated review. Human counsel validation required." >> $GITHUB_STEP_SUMMARY
