name: AI Legal Review & IPFS Manifest
on:
  pull_request:
    paths:
      - 'LEGAL/**'
      - 'COMPLIANCE/**'
      - 'AI_SYSTEM/**'
      - 'IPFS/**'
  push:
    branches: [ main ]
    paths:
      - 'LEGAL/**'
      - 'COMPLIANCE/**'
jobs:
  ai-legal-scan:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - name: Detect Legal File Changes
        id: changed
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git diff --name-only origin/${{ github.base_ref }}...HEAD | grep -E 'LEGAL|COMPLIANCE|IPFS' > changes.txt || true
          else
            git diff --name-only HEAD~1 HEAD | grep -E 'LEGAL|COMPLIANCE|IPFS' > changes.txt || true
          fi
          echo "CHANGED_FILES=$(cat changes.txt | tr '\n' ',' | sed 's/,$//')" >> $GITHUB_ENV
      - name: Post AI Legal Review Comment
        if: env.CHANGED_FILES != ''
        uses: actions/github-script@v7
        with:
          script: |
            const changed = process.env.CHANGED_FILES;
            const body = `## &#x1F916; AI Legal Architect Review Triggered
**Changed Files:** ${changed}
**Actions Required:**
1. Verify all Conditions Precedent remain satisfied.
2. Check for dilution of TROPTIONS protections.
3. If document is \`#FINAL\`, generate SHA-256 and prepare IPFS manifest entry.
4. Compliance Officer must approve before merge.
---
*[AI-LEGAL] Automated review. Human counsel validation required.*`;
            if (context.eventName === 'pull_request') {
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: body
              });
            }
