name: T-LEV-8 Regulatory Test Suite
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  howey-gate:
    name: Howey Test Gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract Token Parameters from Docs
        id: extract
        run: |
          # Look for insider allocation percentages
          INSIDER=$(grep -roiP 'insider.*\K\d+(?=%)' LEGAL/*.md COMPLIANCE/*.md 2>/dev/null | head -1 || echo "0")
          if [ -z "$INSIDER" ]; then INSIDER="0"; fi
          echo "insider=$INSIDER" >> $GITHUB_OUTPUT

          # Look for "optional" utility language
          OPTIONAL_COUNT=$(grep -ci "optional" LEGAL/*.md COMPLIANCE/*.md 2>/dev/null || echo "0")
          echo "optional_flags=$OPTIONAL_COUNT" >> $GITHUB_OUTPUT

          # Look for pooled treasury / DAO treasury language
          TREASURY_COUNT=$(grep -ci "treasury\|pooled funds\|collective profit" LEGAL/*.md COMPLIANCE/*.md 2>/dev/null || echo "0")
          echo "treasury_flags=$TREASURY_COUNT" >> $GITHUB_OUTPUT

          # Look for staking yield / reward language
          YIELD_COUNT=$(grep -ci "yield\|apy\|annual percentage\|earn.*rewards" LEGAL/*.md COMPLIANCE/*.md 2>/dev/null || echo "0")
          echo "yield_flags=$YIELD_COUNT" >> $GITHUB_OUTPUT

      - name: Evaluate Howey Prongs
        id: evaluate
        run: |
          echo "## T-LEV-8 Regulatory Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          FAIL=0

          # Gate 1: Insider Allocation > 30%
          INSIDER="${{ steps.extract.outputs.insider }}"
          if [ "$INSIDER" -gt 30 ] 2>/dev/null || [ "$INSIDER" -eq 55 ] 2>/dev/null; then
            echo "FAIL: Insider allocation >30% ($INSIDER%)" >> $GITHUB_STEP_SUMMARY
            FAIL=1
          else
            echo "PASS: Insider allocation OK ($INSIDER%)" >> $GITHUB_STEP_SUMMARY
          fi

          # Gate 2: Optional Utility
          OPTIONAL="${{ steps.extract.outputs.optional_flags }}"
          if [ "$OPTIONAL" -gt 0 ]; then
            echo "FAIL: Optional utility detected ($OPTIONAL instances)" >> $GITHUB_STEP_SUMMARY
            FAIL=1
          else
            echo "PASS: No optional utility flags" >> $GITHUB_STEP_SUMMARY
          fi

          # Gate 3: Pooled Treasury
          TREASURY="${{ steps.extract.outputs.treasury_flags }}"
          if [ "$TREASURY" -gt 0 ]; then
            echo "WARN: Pooled treasury detected ($TREASURY instances)" >> $GITHUB_STEP_SUMMARY
            FAIL=1
          else
            echo "PASS: No pooled treasury flags" >> $GITHUB_STEP_SUMMARY
          fi

          # Gate 4: Staking Yield
          YIELD="${{ steps.extract.outputs.yield_flags }}"
          if [ "$YIELD" -gt 0 ]; then
            echo "WARN: Yield language detected ($YIELD instances)" >> $GITHUB_STEP_SUMMARY
            FAIL=1
          else
            echo "PASS: No yield flags" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          if [ $FAIL -eq 1 ]; then
            echo "Result: FAIL - PR must be rejected or restructured" >> $GITHUB_STEP_SUMMARY
            echo "status=fail" >> $GITHUB_OUTPUT
          else
            echo "Result: PASS - Proceed to human counsel review" >> $GITHUB_STEP_SUMMARY
            echo "status=pass" >> $GITHUB_OUTPUT
          fi

      - name: Fail Build if Howey Gate Failed
        if: steps.evaluate.outputs.status == 'fail'
        run: |
          echo "Failing build due to Howey test gate failure."
          exit 1
